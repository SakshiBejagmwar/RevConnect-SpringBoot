<div class="container">
  <div class="feed-layout">
    <!-- Create Post Section -->
    <div class="card create-post-card">
      <h2 class="card-header">Create Post</h2>
      
      <div class="alert alert-success" *ngIf="successMessage">
        {{ successMessage }}
      </div>
      
      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <textarea
          class="form-control"
          placeholder="What's on your mind?"
          [(ngModel)]="newPostContent"
          rows="3"
        ></textarea>
      </div>

      <!-- File Upload Section -->
      <div class="media-upload-section">
        <div class="upload-options">
          <label class="upload-btn">
            <input
              type="file"
              (change)="onFileSelected($event)"
              accept="image/*,video/*,.pdf,.doc,.docx,.txt"
              style="display: none;"
            />
            <span class="btn btn-secondary btn-sm">📎 Upload File</span>
          </label>
          
          <div class="url-input-group">
            <input
              type="text"
              class="form-control form-control-sm"
              placeholder="Or paste image/video URL"
              [(ngModel)]="mediaUrl"
            />
          </div>
        </div>

        <!-- File Preview -->
        <div *ngIf="selectedFile || mediaUrl" class="file-preview">
          <div class="preview-header">
            <span class="preview-label">
              {{ selectedFile ? selectedFile.name : 'Media URL' }}
            </span>
            <button (click)="removeFile()" class="btn-remove" title="Remove">✕</button>
          </div>
          
          <div *ngIf="selectedFilePreview" class="image-preview">
            <img [src]="selectedFilePreview" alt="Preview" />
          </div>
          
          <div *ngIf="mediaUrl && !selectedFile" class="url-preview">
            <img [src]="mediaUrl" alt="Media" (error)="onMediaError($event)" />
            <p class="url-text">{{ mediaUrl }}</p>
          </div>
          
          <div *ngIf="isUploading" class="upload-progress">
            <div class="spinner-small"></div>
            <span>Uploading...</span>
          </div>
        </div>
      </div>

      <div class="post-actions-bar">
        <button (click)="toggleAdvancedOptions()" class="btn btn-secondary btn-sm">
          {{ showAdvancedOptions ? '▼' : '▶' }} Advanced Options
        </button>
        <button (click)="createPost()" class="btn btn-primary">
          {{ scheduleDate && scheduleTime ? 'Schedule Post' : 'Post' }}
        </button>
      </div>

      <!-- Advanced Options -->
      <div *ngIf="showAdvancedOptions" class="advanced-options">
        <div class="form-group">
          <label>Post Type:</label>
          <select [(ngModel)]="postType" class="form-control">
            <option value="REGULAR">Regular</option>
            <option value="PROMOTIONAL">Promotional</option>
            <option value="ANNOUNCEMENT">Announcement</option>
          </select>
        </div>

        <div class="form-group" *ngIf="postType === 'PROMOTIONAL'">
          <label>Call to Action:</label>
          <select [(ngModel)]="callToAction" class="form-control">
            <option value="">None</option>
            <option value="LEARN_MORE">Learn More</option>
            <option value="SHOP_NOW">Shop Now</option>
            <option value="CONTACT_US">Contact Us</option>
            <option value="SIGN_UP">Sign Up</option>
          </select>
        </div>

        <div class="form-group">
          <label>Schedule Post (Optional):</label>
          <div class="schedule-inputs">
            <input
              type="date"
              [(ngModel)]="scheduleDate"
              class="form-control"
              placeholder="Date"
            />
            <input
              type="time"
              [(ngModel)]="scheduleTime"
              class="form-control"
              placeholder="Time"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- Feed Type Tabs -->
    <div class="card">
      <div class="feed-tabs">
        <button
          class="feed-tab"
          [class.active]="selectedFeedType === 'all'"
          (click)="setFeedType('all')"
        >
          My Feed
        </button>
        <button
          class="feed-tab"
          [class.active]="selectedFeedType === 'trending'"
          (click)="setFeedType('trending')"
        >
          🔥 Trending
        </button>
        <button class="filter-btn" (click)="toggleFilters()">
          🔍 Filters
        </button>
      </div>

      <!-- Filters Panel -->
      <div *ngIf="showFilters" class="filters-panel">
        <h3>Filter Feed</h3>
        
        <div class="filter-group">
          <label>Post Type:</label>
          <select [(ngModel)]="selectedPostType" class="form-control">
            <option value="all">All Posts</option>
            <option value="REGULAR">Regular</option>
            <option value="PROMOTIONAL">Promotional</option>
            <option value="ANNOUNCEMENT">Announcement</option>
          </select>
        </div>

        <div class="filter-group">
          <label>User Type:</label>
          <select [(ngModel)]="selectedUserType" class="form-control">
            <option value="all">All Users</option>
            <option value="USER">Personal</option>
            <option value="CREATOR">Creator</option>
            <option value="BUSINESS">Business</option>
          </select>
        </div>

        <div class="filter-actions">
          <button (click)="applyFilters()" class="btn btn-primary">Apply Filters</button>
          <button (click)="clearFilters()" class="btn btn-secondary">Clear</button>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="text-center">
      <div class="spinner"></div>
      <p>Loading feed...</p>
    </div>

    <!-- Posts Feed -->
    <div *ngIf="!isLoading">
      <div *ngIf="posts.length === 0" class="card text-center">
        <p class="text-muted">No posts to display. Start following people or create your first post!</p>
      </div>

      <app-post-card
        *ngFor="let post of posts"
        [post]="post"
        (postDeleted)="onPostDeleted($event)"
      ></app-post-card>
    </div>
  </div>
</div>
